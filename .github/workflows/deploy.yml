name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  AWS_REGION: ap-south-1
  IMAGE_NAME: mayatrail-web

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        run: |
          # GHCR requires a lowercase namespace
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/$OWNER/$IMAGE_NAME"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          echo "image=$IMAGE:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          cat > /tmp/commands.json <<EOF
          {"commands": [
            "set -euo pipefail",
            "docker pull $IMAGE",
            "docker stop mayatrail-web || true",
            "docker rm mayatrail-web || true",
            "docker run -d --name mayatrail-web -p 0.0.0.0:80:80 --restart unless-stopped $IMAGE",
            "docker image prune -af"
          ]}
          EOF

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ github.sha }}" \
            --parameters file:///tmp/commands.json \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CMD_ID"

          # poll until the command finishes (up to 5 minutes)
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
              *) sleep 5 ;;
            esac
          done

          echo "--- remote stdout ---"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text
          if [ "$STATUS" != "Success" ]; then
            echo "--- remote stderr ---"
            aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' --output text
            echo "Deploy failed with status: $STATUS"
            exit 1
          fi

      - name: Smoke test
        run: |
          # the ALB needs ~2 healthy checks (30s apart) before routing to the new container
          for i in $(seq 1 12); do
            if curl -sfL https://mayatrail.tech/health -o /dev/null; then
              curl -sfL https://mayatrail.tech/ -o /tmp/page
              grep -qF "MayaTrail" /tmp/page && { echo "Smoke test passed"; exit 0; }
            fi
            echo "Attempt $i: not ready yet, retrying in 15s..."
            sleep 15
          done
          echo "Smoke test failed after 3 minutes"
          exit 1
